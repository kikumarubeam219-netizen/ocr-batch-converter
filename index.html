<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR一括変換 - 画像からPDFへ</title>
  <meta name="description" content="複数の画像ファイルを一括OCR処理し、検索可能なPDFに変換するWebアプリケーション" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="app">
    <!-- ヘッダー -->
    <header class="header">
      <div class="header__inner">
        <div class="header__brand">
          <div class="header__icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
          </div>
          <div>
            <h1 class="header__title">OCR一括変換</h1>
            <p class="header__subtitle">画像 → 検索可能PDF</p>
          </div>
        </div>
        <div class="header__badge">完全ローカル処理</div>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main">
      <!-- ステップインジケータ -->
      <div class="steps">
        <div class="step active" id="step-indicator-1">
          <div class="step__number">1</div>
          <div class="step__label">画像を選択</div>
        </div>
        <div class="step__connector"></div>
        <div class="step" id="step-indicator-2">
          <div class="step__number">2</div>
          <div class="step__label">PDF生成</div>
        </div>
        <div class="step__connector"></div>
        <div class="step" id="step-indicator-3">
          <div class="step__number">3</div>
          <div class="step__label">OCR処理</div>
        </div>
      </div>

      <!-- ステップ1: ファイル選択 -->
      <section class="section" id="section-upload">
        <div class="dropzone" id="dropzone">
          <div class="dropzone__content">
            <div class="dropzone__icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </div>
            <p class="dropzone__title">画像ファイルをドラッグ＆ドロップ</p>
            <p class="dropzone__subtitle">または、クリックしてファイルを選択</p>
            <p class="dropzone__hint">PNG, JPG, JPEG, WEBP, BMP, TIFF 対応 ・ 最大500ファイル</p>
          </div>
          <input type="file" id="file-input" multiple accept="image/png,image/jpeg,image/webp,image/bmp,image/tiff,.png,.jpg,.jpeg,.webp,.bmp,.tiff,.tif" hidden />
        </div>
      </section>

      <!-- 設定パネル -->
      <section class="section settings-section" id="section-settings" style="display:none;">
        <h2 class="section__title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          設定
        </h2>
        <div class="settings-grid">
          <div class="setting-card">
            <label class="setting-label" for="ocr-lang">OCR言語</label>
            <select id="ocr-lang" class="setting-select">
              <option value="jpn+eng" selected>日本語 + 英語</option>
              <option value="jpn">日本語のみ</option>
              <option value="eng">英語のみ</option>
              <option value="chi_sim+eng">中国語(簡体) + 英語</option>
              <option value="kor+eng">韓国語 + 英語</option>
            </select>
          </div>
          <div class="setting-card">
            <label class="setting-label" for="pdf-quality">画像品質</label>
            <select id="pdf-quality" class="setting-select">
              <option value="0.9" selected>高品質</option>
              <option value="0.7">標準</option>
              <option value="0.5">低品質（軽量）</option>
            </select>
          </div>
          <div class="setting-card">
            <label class="setting-label" for="worker-count">並列処理数</label>
            <select id="worker-count" class="setting-select">
              <option value="2">2 ワーカー</option>
              <option value="4" selected>4 ワーカー</option>
              <option value="6">6 ワーカー</option>
              <option value="8">8 ワーカー</option>
            </select>
          </div>
          <div class="setting-card">
            <label class="setting-label" for="page-size">ページサイズ</label>
            <select id="page-size" class="setting-select">
              <option value="auto" selected>画像に合わせる</option>
              <option value="a4">A4</option>
              <option value="letter">レター</option>
            </select>
          </div>
        </div>
      </section>

      <!-- ファイルリスト -->
      <section class="section" id="section-filelist" style="display:none;">
        <div class="filelist-header">
          <h2 class="section__title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span id="file-count-label">ファイル一覧</span>
          </h2>
          <div class="filelist-actions">
            <button class="btn btn--ghost" id="btn-clear">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
              クリア
            </button>
            <button class="btn btn--ghost" id="btn-add-more">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              追加
            </button>
          </div>
        </div>
        <div class="filelist" id="filelist"></div>
      </section>

      <!-- 進捗セクション -->
      <section class="section" id="section-progress" style="display:none;">
        <h2 class="section__title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="20" x2="12" y2="10"></line>
            <line x1="18" y1="20" x2="18" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="16"></line>
          </svg>
          処理状況
        </h2>
        <div class="progress-container">
          <div class="progress-stats">
            <span id="progress-text">0 / 0 ファイル完了</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar__fill" id="progress-fill" style="width: 0%"></div>
          </div>
          <div class="progress-details">
            <span id="progress-elapsed">経過時間: 0:00</span>
            <span id="progress-eta">残り時間: 計算中...</span>
          </div>
        </div>
        <div class="current-file" id="current-file" style="display:none;">
          <div class="current-file__label">処理中:</div>
          <div class="current-file__name" id="current-file-name"></div>
        </div>
      </section>

      <!-- アクションボタン -->
      <section class="section action-section" id="section-actions" style="display:none;">
        <button class="btn btn--primary btn--lg" id="btn-generate-pdf">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          PDFを生成
        </button>
        <button class="btn btn--success btn--lg" id="btn-start-ocr" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          OCR処理を開始
        </button>
        <button class="btn btn--accent btn--lg" id="btn-download" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          PDFをダウンロード
        </button>
        <button class="btn btn--ghost" id="btn-cancel" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          キャンセル
        </button>
      </section>

      <!-- 完了メッセージ -->
      <section class="section completion-section" id="section-complete" style="display:none;">
        <div class="completion-card">
          <div class="completion-icon">✅</div>
          <h2 class="completion-title">変換完了!</h2>
          <p class="completion-text" id="completion-text"></p>
        </div>
      </section>
    </main>

    <!-- フッター -->
    <footer class="footer">
      <p>すべての処理はブラウザ内で完結します。画像データはサーバーに送信されません。</p>
    </footer>

    <!-- トースト通知 -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
